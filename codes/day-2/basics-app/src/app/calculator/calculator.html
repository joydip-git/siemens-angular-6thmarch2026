<fieldset>
    <legend>Calculator</legend>
    <div>
        <label for="radioAdd">Add:</label>
        <input type="radio" name="calcradios" id="radioAdd" checked>

        &nbsp;&nbsp;&nbsp;&nbsp;

        <label for="radioSubtract">Subtract:</label>
        <input type="radio" name="calcradios" id="radioSubtract">

        &nbsp;&nbsp;&nbsp;&nbsp;

        <label for="radioMultiply">Multiply:</label>
        <input type="radio" name="calcradios" id="radioMultiply">

        &nbsp;&nbsp;&nbsp;&nbsp;

        <label for="radioDivide">Divide:</label>
        <input type="radio" name="calcradios" id="radioDivide">
    </div>
    <div>
        <label for="txtFirst">First Value:&nbsp;</label>
        <input type="number" id="txtFirst">
    </div>
    <div>
        <label for="txtSecond">Second Value:&nbsp;</label>
        <input type="number" id="txtSecond">
    </div>
    <div>
        <input type="button" value="Calculate">
    </div>
    <div>
        <label for="txtResult">Result:&nbsp;</label>
        <input type="text" id="txtResult" readonly>
    </div>
</fieldset>
